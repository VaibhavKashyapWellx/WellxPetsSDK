name: wellx_pets_sdk
description: "Wellx Pets SDK - Embeddable pet health module for the Wellx platform"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.8.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.0
  image_picker: ^1.1.0
  geolocator: ^13.0.0
  flutter_markdown: ^0.7.0
  http: ^1.3.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  uuid: ^4.5.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  module:
    androidX: true
    androidPackage: com.wellx.wellx_pets_sdk
    iosBundleIdentifier: com.wellx.wellxPetsSdk
